version: "2"
sql:
  - engine: "mysql"
    queries: "db/queries"
    schema: "db/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/database/sqlc"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "json"
            go_type: "encoding/json.RawMessage"
          - column: "vendors.social_links"
            go_type:
              type: "RawMessage"
              import: "encoding/json"
              pointer: true
