# Optional local infrastructure — not required for development.
# Default workflow: local MySQL + `make dev` (see README).
#
# Start MySQL + Redis only:
#   docker compose up -d
#
# Also start phpMyAdmin:
#   docker compose --profile tools up -d
#
# Run API in Docker (optional):
#   docker compose --profile app up -d

services:
  mysql:
    image: mysql:8.0
    container_name: lumi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lumi_marketplace
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: lumi_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    profiles: [tools]
    image: phpmyadmin:latest
    container_name: lumi_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

  api:
    profiles: [app]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumi_api
    restart: unless-stopped
    env_file:
      - .env.docker.example
    environment:
      DB_HOST: mysql
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  mysql_data:
  redis_data:
