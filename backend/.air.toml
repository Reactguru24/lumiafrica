root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "$GO build -o ./tmp/main ./cmd/main.go"
  delay = 500
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", "bin", "seeders", "scripts"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql", "env"]
  kill_delay = "500ms"
  log = "tmp/build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
